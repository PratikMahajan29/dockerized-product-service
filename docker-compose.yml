services:
  mysql:
    image: mysql:8.0
    container_name: mysql1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pAdmin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  product-service:
    build: .
    container_name: product-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql1:3306/product?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

  ui:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: product-ui
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - product-service

volumes:
  mysql-data: